spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/callpilot_ai}
    username: ${SPRING_DATASOURCE_USERNAME:callpilot}
    password: ${SPRING_DATASOURCE_PASSWORD:callpilot}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate

callpilot:
  demo-auth:
    name: ${DEMO_AUTH_NAME:Demo Admin}
    email: ${DEMO_AUTH_EMAIL:admin@callpilot.ai}
    password: ${DEMO_AUTH_PASSWORD:Password@123}

  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
