server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-binding-errors: never
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: callpilot-ai
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/callpilot_ai}
    username: ${SPRING_DATASOURCE_USERNAME:callpilot}
    password: ${SPRING_DATASOURCE_PASSWORD:callpilot}
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      pool-name: CallPilotHikariPool
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

callpilot:
  security:
    jwt:
      issuer: ${JWT_ISSUER:callpilot-ai}
      secret: ${JWT_SECRET:change-me-in-local-only-change-me-in-local-only}
      access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:PT15M}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
      allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept}

