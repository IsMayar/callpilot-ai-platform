server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  error:
    include-binding-errors: never
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: callpilot-ai

  datasource:
    url: jdbc:postgresql://localhost:5432/callpilot_ai
    username: postgres
    password: Isis@2025
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      pool-name: CallPilotHikariPool

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      probes:
        enabled: true

callpilot:
  demo-auth:
    name: ${DEMO_AUTH_NAME:Demo Admin}
    email: ${DEMO_AUTH_EMAIL:admin@callpilot.ai}
    password: ${DEMO_AUTH_PASSWORD:Password@123}

  security:
    jwt:
      issuer: callpilot-ai
      secret: change-me-in-local-only-change-me-in-local-only
      access-token-expiration: PT15M

    cors:
      allowed-origins: http://localhost:5173
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,Accept
